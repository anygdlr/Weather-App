<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="main-box">
      <header>
        <form id="search-form">
          <input
            type="search"
            placeholder="Enter a city"
            required
            class="search-form-input"
            id="city-received"
          />
          <input type="submit" value="Search" class="search-form-submit" />
        </form>
      </header>
      <main>
        <div class="weather-data">
          <div>
            <h1 class="weather-city" id="city">The Weather App</h1>
            <p class="weather-details">
              <span id="current-date"></span><span>,</span>
              <span id="current-condition">-</span>.
              <br />
              Humidity <strong id="current-humidity">-</strong>, Wind
              <strong id="current-wind">-</strong>
              <strong id="current-wind-unit"> km/hr</strong>
            </p>
          </div>
          <div class="weather-temperature">
            <div class="weather-temperature-icon" id="weather-icon"></div>
            <div class="weather-temperature-value" . id="current-temperature">
              -
            </div>
            <div class="weather-temperature-unit">°C</div>
          </div>
        </div>
        <div class="weather-forecast" id="forecast"></div>
      </main>
      <footer>
        This project was coded by
        <a href="https://linkedin.com/in/anygdlr" target="_blank">
          Ana Gonzalez</a
        >
        and is on
        <a href="https://github.com/anygdlr" target="_blank"> GitHub </a>
        and hosted on
        <a href="https://anygdlr-weather-app.netlify.app/" target="_blank">
          Netlify</a
        >
      </footer>
    </div>
  </body>
  <script src="src/index.js"></script>
</html>
